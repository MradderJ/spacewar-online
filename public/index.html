<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacewar! — Online</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Courier New',monospace; }
  canvas { background:#000; display:block; }

  /* Menu overlay */
  #menu {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    background:rgba(0,0,0,0.85); z-index:10;
  }
  #menu h1 { color:#0ff; font-size:48px; margin-bottom:10px; text-shadow:0 0 20px #0ff; }
  #menu h2 { color:#f44; font-size:16px; margin-bottom:40px; }
  #menu button {
    background:transparent; color:#fff; border:1px solid #555;
    padding:12px 40px; margin:6px; font-size:18px; cursor:pointer;
    font-family:'Courier New',monospace; width:280px;
  }
  #menu button:hover { background:#222; border-color:#0ff; }
  #menu input {
    background:#111; color:#fff; border:1px solid #555;
    padding:12px; font-size:24px; width:200px; text-align:center;
    font-family:'Courier New',monospace; text-transform:uppercase;
    letter-spacing:8px;
  }
  #menu .status { color:#888; font-size:13px; margin-top:16px; }
  #menu .code-display { color:#0ff; font-size:48px; letter-spacing:12px; margin:16px 0; text-shadow:0 0 20px #0ff; font-weight:bold; }
  #menu .back { color:#555; font-size:13px; cursor:pointer; }
  #menu .back:hover { color:#fff; }
  .hidden { display:none !important; }

  #connect-status {
    position:absolute; top:50px; left:50%; transform:translateX(-50%);
    color:#0a0; font-size:13px; text-align:center; pointer-events:none; z-index:5;
  }
  noscript { color:#fff; text-align:center; display:block; margin-top:40vh; }
</style>
</head>
<body>

<!-- Menu -->
<div id="menu">
  <h1>⚔ SPACEWAR!</h1>
  <h2>— orbital combat —</h2>
  <p style="color:#f44; font-size:12px; margin-top:-30px; margin-bottom:28px;">by Jim</p>
  <div id="menu-main">
    <button onclick="startLocal()">👤 LOCAL PLAY</button>
    <button onclick="showHost()">🌐 HOST ONLINE</button>
    <button onclick="showJoin()">🔗 JOIN ONLINE</button>
  </div>

  <div id="menu-host" class="hidden">
    <p style="color:#888;margin-bottom:10px">Waiting for opponent...</p>
    <div class="code-display" id="room-code">----</div>
    <div class="status">Share this code with a friend</div>
    <div class="back" onclick="backToMenu()">← Back</div>
  </div>

  <div id="menu-join" class="hidden">
    <p style="color:#888;margin-bottom:14px">Enter room code:</p>
    <input id="join-code" maxlength="4" placeholder="CODE" oninput="this.value=this.value.toUpperCase()">
    <button onclick="doJoin()" style="margin-top:12px">JOIN</button>
    <div id="join-error" class="status" style="color:#f44"></div>
    <div class="back" onclick="backToMenu()" style="margin-top:10px">← Back</div>
  </div>
</div>

<div id="connect-status" class="hidden"></div>
<div id="gameover-msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:48px;text-align:center;pointer-events:none;z-index:5;display:none;text-shadow:0 0 20px currentColor;"></div>
<div id="ctrl-hint" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#aaa;font-size:13px;text-align:center;pointer-events:none;z-index:5;text-shadow:0 0 4px #000;"></div>
<canvas id="game" width="900" height="700"></canvas>
<noscript>JavaScript krävs för Spacewar!</noscript>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 700;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min((innerWidth-40)/W, (innerHeight-80)/H, 1.8);
  canvas.style.width = (W*s)+'px'; canvas.style.height = (H*s)+'px';
}
resize(); addEventListener('resize', resize);

// ── WebSocket ──
let ws = null;
let onlineMode = false;
let opponentKeys = {};

function getWsUrl() {
  const loc = window.location;
  const proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${loc.host}`;
}

function connectWs(onOpen) {
  const url = getWsUrl();
  ws = new WebSocket(url);
  ws.onopen = onOpen;
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'room_created':
        document.getElementById('room-code').textContent = msg.code;
        break;
      case 'matched':
        onlineMode = true;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('connect-status').classList.remove('hidden');
        document.getElementById('connect-status').textContent =
          '🟢 Connected — ' + (msg.role === 'host' ? 'P1 (cyan)' : 'P2 (red)');
        document.getElementById('ctrl-hint').textContent = 'YOU: A/D · W · Space · X';
        resetGame();
        break;
      case 'opponent_input':
        opponentKeys = msg.keys || {};
        break;
      case 'opponent_disconnected':
        document.getElementById('connect-status').textContent = '🔴 Opponent disconnected';
        ws = null; onlineMode = false;
        setTimeout(() => { document.getElementById('menu').classList.remove('hidden'); }, 2000);
        break;
      case 'pong': break;
      case 'error':
        document.getElementById('join-error').textContent = msg.message;
        break;
    }
  };
  ws.onclose = () => {
    if (onlineMode) {
      document.getElementById('connect-status').textContent = '🔴 Disconnected';
      onlineMode = false;
    }
  };
}

function sendInput() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const state = { a:!!keys['a'], d:!!keys['d'], w:!!keys['w'], space:!!keys[' '], x:!!keys['x'] };
  ws.send(JSON.stringify({ type: 'input', keys: state }));
}

// ── Menu handlers ──
function startLocal() {
  onlineMode = false;
  p2Human = false;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('ctrl-hint').textContent = 'P1: A/D · W · Space · X  |  P2: J/L · I · K · U';
  resetGame();
}

function showHost() {
  document.getElementById('menu-main').classList.add('hidden');
  document.getElementById('menu-host').classList.remove('hidden');
  document.getElementById('room-code').textContent = '....';
  connectWs(() => ws.send(JSON.stringify({ type: 'host' })));
}

function showJoin() {
  document.getElementById('menu-main').classList.add('hidden');
  document.getElementById('menu-join').classList.remove('hidden');
}

function doJoin() {
  const code = document.getElementById('join-code').value;
  if (code.length !== 4) { document.getElementById('join-error').textContent = 'Enter a 4-letter code'; return; }
  document.getElementById('join-error').textContent = '';
  connectWs(() => ws.send(JSON.stringify({ type: 'join', code })));
}

function backToMenu() {
  document.getElementById('menu-main').classList.remove('hidden');
  document.getElementById('menu-host').classList.add('hidden');
  document.getElementById('menu-join').classList.add('hidden');
  if (ws) { ws.close(); ws = null; }
  onlineMode = false;
}

// ═══════════════════════════════════════════════
//  GAME CODE (abridged — full physics & render)
// ═══════════════════════════════════════════════

// ── Audio ──
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// ── Physics ──
const G = 0.000009, RS = 28, RH = 28;  // krasch vid planetens yta
const MAX_TORP = 3, MAX_FUEL = 100, THRUST = 55, ROT_SPEED = 3.0;
const TORP_SPEED = 157, TORP_LIFE = 5.0, SHIP_R = 16;
const LASER_RANGE = 7 * SHIP_R, LASER_CD = 0.4, LASER_DUR = 0.08;

function accel(x, y) {
  const dx = W/2 - x, dy = H/2 - y;
  const r = Math.hypot(dx, dy);
  if (r < 1 || !isFinite(r)) return {ax:0, ay:0};
  // Kubisk: a = G * r³ — svag nära, stark vid kanterna
  const a = G * r * r * r;
  return {ax: dx/r * a, ay: dy/r * a};
}
function wrap(o) {
  const m = 50;
  if (o.x < -m) o.x = W+m; if (o.x > W+m) o.x = -m;
  if (o.y < -m) o.y = H+m; if (o.y > H+m) o.y = -m;
}

function makeShip(x,y,angle,color,name) {
  return { x,y, vx:0, vy:0, angle, color, name, radius:SHIP_R,
    fuel:MAX_FUEL, torpedoes:MAX_TORP, hp:5, maxHp:5, alive:true, score:0,
    fired:false, aiThrusting:false, laserCD:0, laserActive:false, laserTimer:0, trail:[] };
}

const star = {x:W/2, y:H/2};
const ORBIT_R = 180;
function orbitVel(r) { return Math.sqrt(G) * r * r; }  // kubisk: v = √G · r²

let p1, p2, torps, debris, bgStars, starAngle, comets, flashTimer;
let gameOver, goTimer, p2Human, last;
let starShake = 0;  // skakning på planeten
let planetBoomTimer = 40;  // explosion på planeten var 40:e sek
let gameTime = 0;  // speltid i sekunder
let shadowAngle = -1;  // skugga på planeten (-1 = ingen skugga)

function resetGame() {
  gameOver = false; goTimer = 0; last = performance.now();  // sätt last till aktuell tid
  p2Human = false;
  const s1 = p1 ? p1.score : 0, s2 = p2 ? p2.score : 0;
  p1 = makeShip(450 + ORBIT_R, 350, -Math.PI/2, '#0ff', 'P1');
  p1.vx = 0; p1.vy = -orbitVel(ORBIT_R); p1.score = s1;
  p2 = makeShip(450 - ORBIT_R, 350, Math.PI/2, '#f44', 'P2');
  p2.vx = 0; p2.vy = orbitVel(ORBIT_R); p2.score = s2;
  torps = []; debris = []; comets = []; flashTimer = 0; starAngle = 0;

  if (!bgStars) {
    bgStars = [];
    for (let i=0; i<250; i++) {
      let x,y;
      do { x=Math.random()*W; y=Math.random()*H; } while (Math.hypot(x-star.x,y-star.y)<100);
      const bright = Math.random();
      const r = bright > 0.95 ? Math.random()*1.8+0.8 : bright > 0.8 ? Math.random()*1.2+0.4 : Math.random()*0.6+0.1;
      const a = 0.2 + bright * 0.8;
      const dx = x - star.x, dy = y - star.y;
      bgStars.push({dist: Math.hypot(dx,dy), ang: Math.atan2(dy,dx), r, alpha:a, flashTimer:0, flashColor:'#fff'});
    }
  }
}

// ── Input ──
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key===' '||e.key==='p') e.preventDefault();
  if (!onlineMode && ['j','l','i','k','u'].includes(e.key.toLowerCase())) p2Human = true;
  initAudio();
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
addEventListener('blur', () => { for (const k in keys) keys[k] = false; });

// ── Helpers ──
function fire(ship) {
  if (!ship.alive || ship.torpedoes < 1) return;
  ship.torpedoes--; if (ship.torpedoes < 0) ship.torpedoes = 0;
  const a = ship.angle;
  torps.push({ x: ship.x+Math.cos(a)*(SHIP_R+4), y: ship.y+Math.sin(a)*(SHIP_R+4),
    vx: ship.vx+Math.cos(a)*TORP_SPEED, vy: ship.vy+Math.sin(a)*TORP_SPEED, life: TORP_LIFE, owner: ship });
}

function fireLaser(ship) {
  if (!ship.alive || ship.laserCD > 0) return;
  ship.laserCD = LASER_CD; ship.laserActive = true; ship.laserTimer = LASER_DUR;
  const ca = Math.cos(ship.angle), sa = Math.sin(ship.angle);
  const sx = ship.x + ca * SHIP_R, sy = ship.y + sa * SHIP_R;
  const ex = sx + ca * LASER_RANGE, ey = sy + sa * LASER_RANGE;
  const enemy = ship === p1 ? p2 : p1;
  if (!enemy.alive) return;
  const dx = ex - sx, dy = ey - sy, len2 = dx*dx + dy*dy;
  const tRaw = ((enemy.x - sx) * dx + (enemy.y - sy) * dy) / len2;
  if (tRaw < 0) return;
  const t = Math.min(1, tRaw), dist = Math.hypot(enemy.x - (sx + t*dx), enemy.y - (sy + t*dy));
  if (dist < enemy.radius + 3) {
    enemy.hp -= 1;
    explode(enemy.x, enemy.y, ship.color, 6);  // visual feedback
    if (enemy.hp <= 0) { enemy.alive = false; ship.score++; endRound(); }
  }
  // Destroy torpedoes in beam path
  for (let i = torps.length - 1; i >= 0; i--) {
    const torp = torps[i];
    const ttRaw = ((torp.x - sx) * dx + (torp.y - sy) * dy) / len2;
    const tt = Math.max(0, Math.min(1, ttRaw));
    const tpx = sx + tt * dx, tpy = sy + tt * dy;
    if (Math.hypot(torp.x - tpx, torp.y - tpy) < 6) {
      torps[i] = torps[torps.length-1]; torps.pop();
    }
  }
}

function tooCloseToStar(x,y) { const d = x-star.x, e = y-star.y; return d*d + e*e < RH*RH; }
function explode(x,y,c,n=12) { for (let i=0; i<n; i++) { const a=Math.random()*6.283, s=30+Math.random()*120; debris.push({x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.4+Math.random()*0.8, color:c, r:1+Math.random()*3}); } }

function endRound() {
  if (gameOver) return; gameOver = true; goTimer = 2.0;
  const goMsg = document.getElementById('gameover-msg');
  const msg = (!p1.alive && !p2.alive) ? 'DRAW!'
            : !p1.alive ? (onlineMode ? 'YOU LOSE' : 'P2 WINS')
            : (onlineMode ? 'YOU WIN!' : 'P1 WINS');
  goMsg.textContent = msg;
  goMsg.style.color = (!p1.alive && !p2.alive) ? '#ff0' : (p1.alive ? '#0ff' : '#f44');
  goMsg.style.display = 'block';
  setTimeout(() => { goMsg.style.display = 'none'; }, 2000);
}

function resetRound() {
  const s1 = p1.score, s2 = p2.score;
  p1 = makeShip(450+ORBIT_R, 350, -Math.PI/2, '#0ff', 'P1');
  p1.vx = 0; p1.vy = -orbitVel(ORBIT_R); p1.score = s1;
  p2 = makeShip(450-ORBIT_R, 350, Math.PI/2, '#f44', 'P2');
  p2.vx = 0; p2.vy = orbitVel(ORBIT_R); p2.score = s2;
  torps = []; debris = []; p2Human = false; gameOver = false;
}

// ── AI ──
function updateAI(ship, dt) {
  if (!ship.alive) return;
  const dx = p1.x - ship.x, dy = p1.y - ship.y;
  const target = Math.atan2(dy, dx), dist = Math.hypot(dx, dy);
  let diff = target - ship.angle;
  while (diff > Math.PI) diff -= 2*Math.PI; while (diff < -Math.PI) diff += 2*Math.PI;
  if (diff > 0.08) ship.angle += ROT_SPEED*dt; else if (diff < -0.08) ship.angle -= ROT_SPEED*dt;
  ship.angle = ((ship.angle + Math.PI) % (2*Math.PI)) - Math.PI;  // normalisera
  const sd = Math.hypot(ship.x-star.x, ship.y-star.y), tooClose = sd < 140;
  const thrusting = Math.abs(diff)<1.0 && ship.fuel>0 && (dist>220 || tooClose);
  ship.aiThrusting = thrusting;
  if (thrusting) {
    const mul = tooClose ? 2.0 : 1.0;
    ship.vx += Math.cos(ship.angle)*THRUST*mul*dt; ship.vy += Math.sin(ship.angle)*THRUST*mul*dt;
    ship.fuel -= 10*dt*(tooClose?2:1);
  } else ship.aiThrusting = false;
  ship.fireCD = (ship.fireCD||0) - dt;
  if (Math.abs(diff)<0.35 && dist<550 && ship.fireCD<=0) { fire(ship); ship.fireCD = 0.5+Math.random()*0.3; }
  if (Math.abs(diff)<0.5 && dist<LASER_RANGE+50 && ship.laserCD<=0) fireLaser(ship);
}

// ── Main loop ──
function tick(time) {
  const rawDt = (time - last) / 1000;
  const dt = isFinite(rawDt) ? Math.max(0, Math.min(rawDt, 0.04)) : 0;
  last = time;

  // Send input in online mode
  if (onlineMode && ws && ws.readyState === WebSocket.OPEN) sendInput();

  if (gameOver) { goTimer -= dt; if (goTimer<=0) resetRound(); else { render(false, false); requestAnimationFrame(tick); return; } }

  const normAngle = (a) => ((a + Math.PI) % (2*Math.PI)) - Math.PI;

  // P1 input (always local)
  if (p1.alive) {
    if (keys['a']||keys['arrowleft']) p1.angle -= ROT_SPEED*dt;
    if (keys['d']||keys['arrowright']) p1.angle += ROT_SPEED*dt;
    p1.angle = normAngle(p1.angle);
    if ((keys['w']||keys['arrowup']) && p1.fuel>0) { p1.vx += Math.cos(p1.angle)*THRUST*dt; p1.vy += Math.sin(p1.angle)*THRUST*dt; p1.fuel -= 10*dt; }
    if (keys[' ']||keys['z']) { if(!p1.fired){fire(p1);p1.fired=true;} } else p1.fired=false;
    if (keys['x']) fireLaser(p1);
  }
  p1.laserCD -= dt; if (p1.laserTimer > 0) p1.laserTimer -= dt; else p1.laserActive = false;

  // P2: online → from network, local → keyboard or AI
  if (p2.alive) {
    if (onlineMode) {
      if (opponentKeys.a) p2.angle -= ROT_SPEED*dt;
      if (opponentKeys.d) p2.angle += ROT_SPEED*dt;
      p2.angle = normAngle(p2.angle);
      if (opponentKeys.w && p2.fuel>0) { p2.vx += Math.cos(p2.angle)*THRUST*dt; p2.vy += Math.sin(p2.angle)*THRUST*dt; p2.fuel -= 10*dt; }
      if (opponentKeys.space) { if(!p2.fired){fire(p2);p2.fired=true;} } else p2.fired=false;
      if (opponentKeys.x) fireLaser(p2);
    } else {
      if (keys['j']) p2.angle -= ROT_SPEED*dt;
      if (keys['l']) p2.angle += ROT_SPEED*dt;
      p2.angle = normAngle(p2.angle);
      if (keys['i'] && p2.fuel>0) { p2.vx += Math.cos(p2.angle)*THRUST*dt; p2.vy += Math.sin(p2.angle)*THRUST*dt; p2.fuel -= 10*dt; }
      if (keys['k']) { if(!p2.fired){fire(p2);p2.fired=true;} } else p2.fired=false;
      if (keys['u']) fireLaser(p2);
    }
  }
  if (!onlineMode && !p2Human) updateAI(p2, dt);
  p2.laserCD -= dt; if (p2.laserTimer > 0) p2.laserTimer -= dt; else p2.laserActive = false;

  // Physics
  const p1thrust = p1.alive && (keys['w']||keys['arrowup']) && p1.fuel>0;
  const p2thrust = p2.alive && (
    onlineMode ? opponentKeys.w
    : p2Human ? keys['i']
    : p2.aiThrusting
  ) && p2.fuel>0;

  for (const ship of [p1, p2]) {
    if (!ship.alive) continue;
    const grav = accel(ship.x, ship.y);
    ship.vx += grav.ax*dt; ship.vy += grav.ay*dt;
    ship.x += ship.vx*dt; ship.y += ship.vy*dt;
    wrap(ship);
    ship.trail.push({x:ship.x,y:ship.y}); if (ship.trail.length>40) ship.trail.shift();

    // Thrust particles
    const thrusting = (ship===p1 && p1thrust) || (ship===p2 && p2thrust);
    if (thrusting) {
      const bx = ship.x - Math.cos(ship.angle)*SHIP_R*0.4;
      const by = ship.y - Math.sin(ship.angle)*SHIP_R*0.4;
      for (let p=0; p<2; p++) {
        debris.push({
          x: bx+(Math.random()-0.5)*4, y: by+(Math.random()-0.5)*4,
          vx: -Math.cos(ship.angle)*(20+Math.random()*40)+ship.vx*0.2,
          vy: -Math.sin(ship.angle)*(20+Math.random()*40)+ship.vy*0.2,
          life: 0.3+Math.random()*0.4, color: ship.color,
          r: 1+Math.random()*2
        });
      }
    }

    if (tooCloseToStar(ship.x, ship.y)) {
      ship.alive = false;
      // Rejäl krasch — massor av partiklar
      for (let k=0; k<5; k++) explode(ship.x, ship.y, '#f80', 20);
      // Blixt
      for (let i=0; i<30; i++) {
        const a=Math.random()*6.283, sp=100+Math.random()*300;
        debris.push({x:ship.x, y:ship.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.5+Math.random()*0.5, color:'#fff', r:2+Math.random()*4});
      }
      const e=ship===p1?p2:p1; if (e.alive) e.score++; endRound();
    }

    // Ship-to-ship collision
    const other = ship === p1 ? p2 : p1;
    if (ship.alive && other.alive) {
      const dx = ship.x - other.x, dy = ship.y - other.y;
      const dist = Math.hypot(dx, dy);
      const minDist = ship.radius + other.radius + 2;
      if (dist < minDist) {
        // Båda tar skada
        ship.hp -= 2; other.hp -= 2;
        // Studsa isär
        const nx = dx/dist || 1, ny = dy/dist || 0;
        const overlap = (minDist - dist) / 2;
        ship.x += nx * overlap; ship.y += ny * overlap;
        other.x -= nx * overlap; other.y -= ny * overlap;
        // Gnistregn
        for (let k=0; k<3; k++) explode((ship.x+other.x)/2, (ship.y+other.y)/2, '#ff0', 10);
        // Kolla om någon dog
        if (ship.hp <= 0) { ship.alive = false; explode(ship.x,ship.y,ship.color,25); other.score++; endRound(); }
        if (other.hp <= 0) { other.alive = false; explode(other.x,other.y,other.color,25); ship.score++; endRound(); }
      }
    }
  }

  // Torpedoes
  for (let i=torps.length-1; i>=0; i--) {
    const t = torps[i]; const g = accel(t.x,t.y);
    t.vx += g.ax*dt; t.vy += g.ay*dt; t.x += t.vx*dt; t.y += t.vy*dt;
    t.life -= dt; wrap(t);
    let remove = false;
    if (tooCloseToStar(t.x, t.y)) remove = true;
    if (t.life > 0) {
      for (const ship of [p1, p2]) {
        if (!ship.alive || ship === t.owner || remove) continue;
        if (Math.hypot(t.x-ship.x, t.y-ship.y) < ship.radius+3) {
          ship.hp -= 3; explode(t.x,t.y, t.owner?t.owner.color:'#ff0',8);
          if (ship.hp <= 0) { ship.alive = false; explode(ship.x,ship.y,ship.color,25); const e=ship===p1?p2:p1; if(e.alive)e.score++; if(!gameOver)endRound(); }
          remove = true; break;
        }
      }
    }
    if (remove || t.life<=0) { torps[i] = torps[torps.length-1]; torps.pop(); }
  }

  // Debris
  for (let i=debris.length-1; i>=0; i--) {
    const d = debris[i]; const g = accel(d.x,d.y);
    d.vx += g.ax*dt; d.vy += g.ay*dt; d.x += d.vx*dt; d.y += d.vy*dt;
    d.life -= dt;
    if (d.life<=0) { debris[i] = debris[debris.length-1]; debris.pop(); }
  }

  // Regen
  if (p1.alive && p1.fuel < MAX_FUEL) p1.fuel += 2*dt;
  if (p2.alive && p2.fuel < MAX_FUEL) p2.fuel += 2*dt;
  if (p1.alive && p1.torpedoes < MAX_TORP) p1.torpedoes += 0.2*dt;
  if (p2.alive && p2.torpedoes < MAX_TORP) p2.torpedoes += 0.2*dt;
  starAngle += dt * 0.04;
  gameTime += dt;  // uppdatera speltid

  // Comets & flashes
  flashTimer -= dt;
  if (flashTimer <= 0) { flashTimer = 0.5+Math.random()*3; const s = bgStars[Math.floor(Math.random()*bgStars.length)]; s.flashTimer = 0.1+Math.random()*0.2; s.flashColor = Math.random()>0.5?'#ff0':'#f44'; }
  
  // Random planet shake
  if (Math.random() < 0.001) starShake = 0.15 + Math.random() * 0.15;
  if (starShake > 0) starShake -= dt;
  
  // Skugga på planeten — slumpvis
  if (shadowAngle < 0 && Math.random() < 0.0008) shadowAngle = Math.random() * Math.PI * 2;
  if (shadowAngle >= 0) {
    shadowAngle += dt * 0.3;
    if (shadowAngle > Math.PI * 4) shadowAngle = -1;
  }

  // Planeten exploderar var 40:e sekund
  planetBoomTimer -= dt;
  if (planetBoomTimer <= 0) {
    planetBoomTimer = 35 + Math.random() * 10;
    starShake = 0.3;
    for (let k=0; k<4; k++) {
      const a = Math.random() * Math.PI * 2;
      const dist = 28 + Math.random() * 15;
      const x = star.x + Math.cos(a) * dist;
      const y = star.y + Math.sin(a) * dist;
      for (let p=0; p<8; p++) {
        const pa = Math.random() * Math.PI * 2;
        const sp = 20 + Math.random() * 80;
        debris.push({
          x, y,
          vx: Math.cos(pa)*sp, vy: Math.sin(pa)*sp,
          life: 0.5+Math.random()*0.6,
          color: ['#f80','#f60','#ff0','#f44'][Math.floor(Math.random()*4)],
          r: 1+Math.random()*2
        });
      }
    }
  }
  if (Math.random() < 0.003) {
    const side = Math.floor(Math.random()*4); let x,y,vx,vy; const spd = 2+Math.random()*4;
    if (side===0) { x=-20; y=Math.random()*H; vx=spd; vy=(Math.random()-0.5)*spd*0.5; }
    else if (side===1) { x=W+20; y=Math.random()*H; vx=-spd; vy=(Math.random()-0.5)*spd*0.5; }
    else if (side===2) { x=Math.random()*W; y=-20; vx=(Math.random()-0.5)*spd*0.5; vy=spd; }
    else { x=Math.random()*W; y=H+20; vx=(Math.random()-0.5)*spd*0.5; vy=-spd; }
    comets.push({x,y,vx,vy, r:1.5+Math.random()*2, life:1.5+Math.random()*2, color:['#ff8','#f80','#8ff','#f88'][Math.floor(Math.random()*4)]});
  }

  render(p1thrust, p2thrust);
  requestAnimationFrame(tick);
}

// ── Render (simplified) ──
function render(p1thrust = false, p2thrust = false) {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // Stars
  for (const s of bgStars) {
    const x = star.x + s.dist * Math.cos(s.ang + starAngle), y = star.y + s.dist * Math.sin(s.ang + starAngle);
    if (x < -10 || x > W+10 || y < -10 || y > H+10) continue;
    if (s.flashTimer > 0) { ctx.globalAlpha = Math.min(1,s.flashTimer/0.15); ctx.fillStyle = s.flashColor; ctx.shadowBlur = 8; ctx.shadowColor = s.flashColor; }
    else { ctx.globalAlpha = s.alpha; ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; }
    ctx.beginPath(); ctx.arc(x,y,s.r,0,6.283); ctx.fill();
    if (s.flashTimer > 0) s.flashTimer -= 1/60;
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Comets
  for (let i=comets.length-1; i>=0; i--) {
    const c = comets[i]; c.x += c.vx; c.y += c.vy; c.life -= 0.016;
    for (let t=0; t<5; t++) {
      const tt = t/5, tx = c.x - c.vx*tt*20, ty = c.y - c.vy*tt*20;
      ctx.globalAlpha = (1-tt)*Math.max(0,c.life)*0.5; ctx.fillStyle = c.color; ctx.shadowBlur = 6; ctx.shadowColor = c.color;
      ctx.beginPath(); ctx.arc(tx,ty,c.r*(1-tt*0.5),0,6.283); ctx.fill();
    }
    ctx.globalAlpha = Math.max(0,c.life); ctx.fillStyle = '#fff'; ctx.shadowBlur = 12; ctx.shadowColor = c.color;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r*1.5,0,6.283); ctx.fill();
    if (c.life <= 0) { comets[i] = comets[comets.length-1]; comets.pop(); }
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Star
  const sx = starShake > 0 ? (Math.random()-0.5)*starShake*20 : 0;
  const sy = starShake > 0 ? (Math.random()-0.5)*starShake*20 : 0;
  const g = ctx.createRadialGradient(star.x+sx, star.y+sy, 0, star.x+sx, star.y+sy, RS);
  g.addColorStop(0,'#fff'); g.addColorStop(0.2,'#fea'); g.addColorStop(0.5,'#f60'); g.addColorStop(1,'#a00');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(star.x+sx, star.y+sy, RS, 0, 6.283); ctx.fill();

  // Skugga som glider över planeten
  if (shadowAngle >= 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(star.x+sx, star.y+sy, RS+1, 0, 6.283);
    ctx.clip();
    const offX = Math.cos(shadowAngle) * RS * 0.6;
    const offY = Math.sin(shadowAngle) * RS * 0.6;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(star.x+sx + offX, star.y+sy + offY, RS * 0.7, 0, 6.283);
    ctx.fill();
    ctx.restore();
  }

  // Trails
  for (const ship of [p1, p2]) {
    if (!ship.alive) continue;
    for (let i=1; i<ship.trail.length; i++) {
      const a = (i/ship.trail.length)*0.25;
      ctx.strokeStyle = ship.color + Math.floor(a*255).toString(16).padStart(2,'0');
      ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(ship.trail[i-1].x,ship.trail[i-1].y); ctx.lineTo(ship.trail[i].x,ship.trail[i].y); ctx.stroke();
    }
  }

  // Torpedoes
  for (const t of torps) {
    const col = t.owner ? t.owner.color : '#ff0';
    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(t.x,t.y,5,0,6.283); ctx.fill(); ctx.shadowBlur = 0;
  }

  // Debris
  for (const d of debris) { ctx.fillStyle = d.color; ctx.globalAlpha = Math.max(0,d.life); ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,6.283); ctx.fill(); }
  ctx.globalAlpha = 1;

  // Laser beams
  for (const ship of [p1, p2]) {
    if (!ship.alive || !ship.laserActive) continue;
    const col = ship.color;
    const ca = Math.cos(ship.angle), sa = Math.sin(ship.angle);
    const sx = ship.x + ca * SHIP_R, sy = ship.y + sa * SHIP_R;
    const ex = sx + ca * LASER_RANGE, ey = sy + sa * LASER_RANGE;
    ctx.shadowColor = col; ctx.shadowBlur = 12;
    ctx.strokeStyle = col + '99'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Ships
  for (const ship of [p1, p2]) {
    if (!ship.alive) continue;
    const bw=30,bh=4,bx=ship.x-bw/2,by=ship.y-ship.radius-10;
    ctx.fillStyle='#300'; ctx.fillRect(bx,by,bw,bh);
    const hpR = Math.max(0, ship.hp/ship.maxHp);
    ctx.fillStyle = hpR>0.5?'#0f0':hpR>0.25?'#ff0':'#f00';
    ctx.fillRect(bx+1,by+1,(bw-2)*hpR,bh-2);
    ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);

    ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle);

    // Thrust flame
    const shipThrust = (ship===p1 && p1thrust) || (ship===p2 && p2thrust);
    if (shipThrust) {
      const f = 6 + Math.random()*8;
      ctx.shadowColor = ship.color; ctx.shadowBlur = 8;
      ctx.strokeStyle = ship.color; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-SHIP_R*0.35,0); ctx.lineTo(-SHIP_R*0.35-f, -1+Math.random()*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.strokeStyle = ship.color; ctx.lineWidth = 2; ctx.shadowColor = ship.color; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.moveTo(SHIP_R,0); ctx.lineTo(-SHIP_R*0.5,-SHIP_R*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(SHIP_R,0); ctx.lineTo(-SHIP_R*0.5,SHIP_R*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-SHIP_R*0.5,-SHIP_R*0.55); ctx.lineTo(-SHIP_R*0.25,-SHIP_R*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-SHIP_R*0.5,SHIP_R*0.55); ctx.lineTo(-SHIP_R*0.25,SHIP_R*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-SHIP_R*0.25,-SHIP_R*0.2); ctx.lineTo(-SHIP_R*0.25,SHIP_R*0.2); ctx.stroke();
    ctx.fillStyle = ship.color; ctx.beginPath(); ctx.arc(SHIP_R*0.25,0,2,0,6.283); ctx.fill();
    ctx.shadowBlur = 0; ctx.restore();
  }

  // HUD
  const lbl = onlineMode ? (opponentKeys ? 'OPPONENT' : 'AI') : 'P2';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left'; ctx.fillStyle = '#0ff';
  ctx.fillText(onlineMode ? 'YOU' : 'P1', 20, 24);
  ctx.font = 'bold 52px monospace'; ctx.fillText(p1.score.toString(), 20, 72);
  ctx.textAlign = 'right'; ctx.fillStyle = '#f44';
  ctx.font = 'bold 16px monospace'; ctx.fillText(lbl, W-20, 24);
  ctx.font = 'bold 52px monospace'; ctx.fillText(p2.score.toString(), W-20, 72);

  // Torped charge indicator
  function drawCharge(x, y, ship) {
    const segs = MAX_TORP, segW = 20, segH = 10, gap = 3;
    const tw = segs * segW + (segs-1) * gap;
    ctx.fillStyle = '#222'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(ship.name, x + tw/2, y - 2);
    for (let i=0; i<segs; i++) {
      const sx = x + i*(segW+gap);
      const fill = Math.max(0, Math.min(1, ship.torpedoes - i));
      const glow = fill > 0.99;
      ctx.fillStyle = '#111'; ctx.fillRect(sx, y+1, segW, segH);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(sx, y+1, segW, segH);
      if (fill > 0.01) {
        const w = Math.max(2, (segW-2) * fill);
        ctx.fillStyle = glow ? '#ff0' : '#660';
        ctx.fillRect(sx+1, y+2, w, segH-2);
      }
      if (glow) {
        ctx.shadowColor = '#ff0'; ctx.shadowBlur = 5;
        ctx.fillStyle = '#ff0'; ctx.fillRect(sx+4, y+4, segW-8, segH-6);
        ctx.shadowBlur = 0;
      }
    }
  }
  drawCharge(50, 80, p1);
  const tw = MAX_TORP * 20 + (MAX_TORP-1) * 3;
  drawCharge(W - 50 - tw, 80, p2);

  ctx.fillStyle = '#444'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
  ctx.fillText('by Jim', 10, H - 10);

  // Timer i högra hörnet längst ner
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  const minStr = String(mins).padStart(2,'0');
  const secStr = String(secs).padStart(2,'0');
  ctx.textAlign = 'right';
  ctx.font = 'bold 24px monospace'; ctx.fillStyle = '#fff';
  ctx.fillText(minStr + ':' + secStr, W - 12, H - 10);
}

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
resetGame();
requestAnimationFrame(tick);
</script>
